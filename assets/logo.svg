<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Nord Light Palette -->
  <rect width="128" height="128" rx="24" fill="#ECEFF4"/>
  <rect width="124" height="124" x="2" y="2" rx="22" fill="none" stroke="#D8DEE9" stroke-width="2"/>

  <!-- The World (Enlarged and Spread Right) -->
  <g transform="translate(92, 64)">
    <circle r="22" fill="#88C0D0"/>
    <path d="M-13 -13 L-9 -9 L-11 0 L-7 11 L-11 13 L-15 9 Z" fill="#A3BE8C"/>
    <path d="M2 -11 L11 -13 L16 -6 L13 6 L9 13 L2 9 L4 0 Z" fill="#A3BE8C"/>
    <circle r="22" fill="none" stroke="#4C566A" stroke-width="1.5"/>
  </g>

  <!-- The Model (Enlarged Gears and Spread Left) -->
  <g transform="translate(30, 64)">
    <!-- Gear 1 (Primary) -->
    <g transform="translate(-7, -7) scale(0.95)">
      <circle r="12" fill="none" stroke="#4C566A" stroke-width="3"/>
      <path d="M0 -16 V-12 M0 16 V12 M-16 0 H-12 M16 0 H12 M-11.3 -11.3 L-8.5 -8.5 M11.3 11.3 L8.5 8.5 M-11.3 11.3 L-8.5 8.5 M11.3 -11.3 L8.5 -8.5" stroke="#4C566A" stroke-width="3" stroke-linecap="round"/>
      <circle r="4" fill="#4C566A"/>
    </g>
    <!-- Gear 2 (Secondary) - Rotated for Alignment -->
    <g transform="translate(10, 10) scale(0.75) rotate(22.5)">
      <circle r="12" fill="none" stroke="#81A1C1" stroke-width="3"/>
      <path d="M0 -16 V-12 M0 16 V12 M-16 0 H-12 M16 0 H12 M-11.3 -11.3 L-8.5 -8.5 M11.3 11.3 L8.5 8.5 M-11.3 11.3 L-8.5 8.5 M11.3 -11.3 L8.5 -8.5" stroke="#81A1C1" stroke-width="3" stroke-linecap="round"/>
      <circle r="4" fill="#81A1C1"/>
    </g>
  </g>

  <!-- Flow Icons & Arrows -->
  <defs>
    <marker id="arrow-head-final-v2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E3440"/>
    </marker>
  </defs>

  <!-- SENSE -->
  <path d="M78 35 Q60 18 42 35" fill="none" stroke="#2E3440" stroke-width="1.5" stroke-dasharray="2 2" marker-end="url(#arrow-head-final-v2)"/>
  <g transform="translate(60, 18) scale(0.65)">
    <path d="M-12 0 Q0 -10 12 0 Q0 10 -12 0 Z" fill="none" stroke="#5E81AC" stroke-width="2.5"/>
    <circle r="4" fill="#5E81AC"/>
  </g>

  <!-- ACT -->
  <path d="M42 93 Q60 110 78 93" fill="none" stroke="#2E3440" stroke-width="1.5" marker-end="url(#arrow-head-final-v2)"/>
  <g transform="translate(60, 110) scale(0.65)">
    <path d="M-12 0 H4 L10 -8 M4 0 L10 8" fill="none" stroke="#D08770" stroke-width="3" stroke-linecap="round"/>
    <rect x="-16" y="-4" width="6" height="8" rx="1" fill="#D08770"/>
  </g>
</svg>
