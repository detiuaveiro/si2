<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Visualization</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <h1>Bouncing Ball Agent</h1>
        <div id="status">Connecting...</div>
        <div class="main-layout" style="display: flex; gap: 20px; align-items: flex-start; justify-content: center;">
            <div class="game-box">
                <canvas id="gameCanvas" width="500" height="500" style="border: 2px solid #444; border-radius: 8px;"></canvas>
                <div id="info">
                    <p>Ball Coordinates: <span id="ball-pos">-</span></p>
                    <p>Paddle Position: <span id="paddle-pos">-</span></p>
                </div>
            </div>
            <div class="network-box">
                <canvas id="canvas_network" width="500" height="500" style="border: 1px solid #ddd; background: white; border-radius: 8px;"></canvas>
            </div>
        </div>
    </div>
    <script src="draw_tools.js"></script>
    <script src="script.js"></script>
</body>
</html>
