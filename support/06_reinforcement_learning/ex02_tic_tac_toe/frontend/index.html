<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Visualization</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <h1>Tic-Tac-Toe Agent</h1>
        <div id="status">Connecting...</div>
        <div class="main-layout">
            <div class="game-box">
                <canvas id="gameCanvas" width="300" height="300"></canvas>
                <div id="winner-display">Game in progress</div>
                <button id="reset-btn">Reset Game</button>
            </div>
            <div class="network-box">
                <h3>Agent Decision Confidence (Q-Values)</h3>
                <canvas id="canvas_network" width="500" height="400"></canvas>
            </div>
        </div>
    </div>
    <script src="draw_tools.js"></script>
    <script src="script.js"></script>
</body>
</html>
